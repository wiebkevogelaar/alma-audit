const SYSTEM = `Du bist ALMA, die systemische KI-Schreibbegleiterin von Dr. Wiebke Vogelaar (Alma Mater Schreibcoaching). Du analysierst den Textbeziehungs-Audit einer Wissenschaftlerin mit Care-Verantwortung und erstellst eine substantielle, wirklich hilfreiche Analyse.

KERNKONZEPTE:
- Textbeziehung: Emotionale Verbindung zum Schreib-Ich. Drei Vertrauensebenen: in eigene Fähigkeiten, in den Schreibprozess, in begleitende Menschen.
- Care Concentration Gap (CCG): Strukturell weniger Deep Work durch Sorgearbeit. Konzentration braucht Rückzug — Sorgearbeit erschwert Rückzug.
- Drei Sorgearbeitstypen: Aktive (orts-/zeitgebunden), Kognitive (Mental Load = kommt mit an den Schreibtisch), Emotionale (Emotional Load = kommt mit an den Schreibtisch).
- Fürsorgedefizit: Mütter* leisten viel, bekommen wenig zurück.
- Dauerverfügbarkeit: Das eigentliche Strukturproblem, nicht fehlende Disziplin.
- Erschöpfungsblockade: Körper und Geist sagen Nein — kein Willensproblem.
- Erholungsprokrastination: Erholungsbedürfnis drückt sich als Vermeidung aus.
- Academic Mom Guilt: Gleichzeitiges Versagengefühl in Wissenschaft und Mutterschaft.
- Konzentrationsrückbildung: Nach Geburt strukturell schwerer zu konzentrieren — normal und umkehrbar.

DEEP WORK MODELLE:
- Rhythmisch: Täglich feste kleine Zeitfenster (45-90 min). Ideal als Einstieg.
- Bimodal: Ganze Tage oder mehrtägige Phasen. Braucht gute Unterstützung.
- Journalistisch: Flexible Kurzblocks — nur für Geübte.
- Mix: Rhythmisch + bimodal = oft realistischste Lösung für Mütter*.

DEEP WORK BEREITSCHAFT:
- HOCH: Konzentration 4-5/5, Dauer 45+min, etwas Struktur → Bimodal oder Mix, DWE empfehlen
- MITTEL: Konzentration 3/5, Dauer 20-45min → Rhythmisch, DWE als Aufbau

POMODORO-NUANCIERUNG: Wenn Pomodoro erwähnt oder abgelehnt: nicht einfach spiegeln. Erklären dass Pausen beim Deep Work wichtig sind — das Luftholen beim Auftauchen. Herausforderung für Mütter*: in Pausen NICHT in Verfügbarkeit wechseln. Der Alma-Timer hilft dabei. Die Alma-HOOD schafft soziale Verbindlichkeit.

SPRACHREGELN (absolut bindend):

SCHREIBFEE: Nicht nur spiegeln. Immer: Was würde sich ändern wenn die Fee das brächte? + Einladung zum 15-min Freewriting + Hinweis auf Mini-Kurs Textbeziehung.

// ─── UTILS ───────────────────────────────────────────────────────
function setVal(id, val) { S.answers[id] = val; }
function getVal(id) { return S.answers[id]; }

function canAdvance(q) {
  const v = getVal(q.id);
  if (!q || !v) return false;
  if (q.type === "gefuehl" || q.type === "scale" || q.type === "radio") return !!v;
  if (q.type === "ta") return (v || "").trim().length > 0;
  if (q.type === "multi3") return (v || []).length > 0;
  if (q.type === "multi") return (v || []).length > 0;
  if (q.type === "deadline") return !!(v && v.gefuehl);
  return false;
}

function buildMessage() {
  const lines = [`Name: ${S.name}\n`];
  Q.forEach(q => {
    const v = getVal(q.id);
    if (!v) return;
    let d = v;
    if (q.type === "gefuehl") {
      const g = GEFUEHL.find(x => x.v === v);
      d = g ? `${g.l} (${v}/5)` : v;
    } else if (q.type === "radio") {
      const o = (q.opts || []).find(x => x.v === v);
      d = o ? o.l : v;
    } else if (q.type === "multi" || q.type === "multi3") {
      d = (v || []).map(x => { const o = (q.opts||[]).find(y=>y.v===x); return o?o.l:x; }).join(", ");
    } else if (q.type === "deadline") {
      d = `Datum: ${v.datum || "keine"}, Gefühl: ${v.gefuehl || "–"}/5`;
    }
    lines.push(`${q.num}. ${q.text}\n→ ${d}`);
  });
  return lines.join("\n\n");
}

// ─── API CALL ────────────────────────────────────────────────────
async function runAnalysis() {
  S.phase = "loading";
  S.error = null;
  render();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2500,
        system: SYSTEM,
        messages: [{ role: "user", content: buildMessage() }],
      }),
    });

    if (!res.ok) throw new Error(`API Fehler ${res.status}`);
    const data = await res.json();
    const raw = data.content?.find(b => b.type === "text")?.text || "";
    let clean = raw.replace(/^```json\s*/m, "").replace(/```\s*$/m, "").trim();
    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch {
      const last = clean.lastIndexOf('"}');
      if (last > 0) parsed = JSON.parse(clean.slice(0, last + 2) + "}");
      else throw new Error("Analyse konnte nicht gelesen werden");
    }
    S.result = parsed;
    S.phase = "results";
  } catch (e) {
    S.error = `Die Analyse konnte nicht erstellt werden (${e.message}). Bitte versuche es nochmal.`;
    S.phase = "questions";
  }
  render();
}

// ─── RENDER HELPERS ───────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "className") e.className = v;
    else if (k === "style") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function div(className, ...children) { return el("div", { className }, ...children); }
function p(className, text) { const d = el("p", { className }); d.textContent = text; return d; }

// ─── QUESTION RENDERERS ──────────────────────────────────────────
function renderGefuehl(q) {
  const row = div("gefuehl-row");
  const val = getVal(q.id);
  GEFUEHL.forEach(g => {
    const btn = el("button", {
      className: "g-btn" + (val === g.v ? " sel" : ""),
      onClick: () => { setVal(q.id, g.v); render(); }
    }, g.e, el("span", {}, g.l));
    row.appendChild(btn);
  });
  return row;
}

function renderScale(q) {
  const val = getVal(q.id);
  const nums = Array.from({ length: q.max - q.min + 1 }, (_, i) => q.min + i);
  const row = div("scale-row");
  nums.forEach(n => {
    row.appendChild(el("button", {
      className: "sc-btn" + (val === n ? " sel" : ""),
      onClick: () => { setVal(q.id, n); render(); }
    }, String(n)));
  });
  const labs = div("scale-labs");
  labs.appendChild(el("span", {}, q.labs[0]));
  labs.appendChild(el("span", {}, q.labs[1]));
  const wrap = div("");
  wrap.appendChild(row);
  wrap.appendChild(labs);
  return wrap;
}

function renderRadio(q) {
  const val = getVal(q.id);
  const grid = div("radio-grid" + (q.cols === 2 ? " two-col" : ""));
  q.opts.forEach(o => {
    const card = el("div", {
      className: "r-card" + (val === o.v ? " sel" : ""),
      onClick: () => { setVal(q.id, o.v); render(); }
    },
      el("div", { className: "dot" }, val === o.v ? el("div", { className: "dot-inner" }) : null),
      o.l
    );
    grid.appendChild(card);
  });
  return grid;
}

function renderMulti(q, max) {
  const val = getVal(q.id) || [];
  const grid = div("cb-grid");
  q.opts.forEach(o => {
    const sel = val.includes(o.v);
    const card = el("div", {
      className: "cb-card" + (sel ? " sel" : ""),
      onClick: () => {
        let nv = [...val];
        if (nv.includes(o.v)) nv = nv.filter(x => x !== o.v);
        else if (!max || nv.length < max) nv.push(o.v);
        setVal(q.id, nv);
        render();
      }
    },
      el("div", { className: "cb-box" }, sel ? "✓" : ""),
      o.l
    );
    grid.appendChild(card);
  });
  const wrap = div("");
  wrap.appendChild(grid);
  if (max) {
    const note = div("multi-note");
    note.textContent = `${val.length} / ${max} gewählt`;
    wrap.appendChild(note);
  }
  return wrap;
}

function renderTextarea(q) {
  const val = getVal(q.id) || "";
  const ta = el("textarea", {
    className: "ta",
    rows: String(q.rows || 3),
    maxlength: String(q.max || 300),
    placeholder: q.ph || "",
  });
  ta.value = val;
  ta.addEventListener("input", () => { setVal(q.id, ta.value); charEl.textContent = `${ta.value.length} / ${q.max}`; updateBtn(); });
  const charEl = div("char");
  charEl.textContent = `${val.length} / ${q.max}`;
  const wrap = div("");
  wrap.appendChild(ta);
  wrap.appendChild(charEl);
  return wrap;
}

function renderDeadline(q) {
  const val = getVal(q.id) || {};
  const wrap = div("dl-wrap");

  const dateLabel = div("dl-label"); dateLabel.textContent = "Deadline-Datum (optional)";
  const dateInput = el("input", { type: "date", className: "dl-input" });
  dateInput.value = val.datum || "";
  dateInput.addEventListener("change", () => {
    setVal(q.id, { ...getVal(q.id), datum: dateInput.value });
    updateBtn();
  });

  const feelLabel = div("dl-feel"); feelLabel.textContent = "Wie fühlst du dich damit?";
  const feelScale = renderScaleInline({ min: 1, max: 5, labs: ["Sehr belastend", "Kein Stress"] }, val.gefuehl, (n) => {
    setVal(q.id, { ...getVal(q.id), gefuehl: n });
    render();
  });

  wrap.appendChild(dateLabel);
  wrap.appendChild(dateInput);
  wrap.appendChild(feelLabel);
  wrap.appendChild(feelScale);
  return wrap;
}

function renderScaleInline(q, val, onChange) {
  const nums = Array.from({ length: q.max - q.min + 1 }, (_, i) => q.min + i);
  const row = div("scale-row");
  nums.forEach(n => {
    row.appendChild(el("button", {
      className: "sc-btn" + (val === n ? " sel" : ""),
      onClick: () => onChange(n)
    }, String(n)));
  });
  const labs = div("scale-labs");
  labs.appendChild(el("span", {}, q.labs[0]));
  labs.appendChild(el("span", {}, q.labs[1]));
  const wrap = div("");
  wrap.appendChild(row);
  wrap.appendChild(labs);
  return wrap;
}

let updateBtn; // global ref so input handlers can call it

function renderQuestion() {
  const q = Q[S.step];
  const sec = SECTIONS[q.s];
  const progress = (S.step / Q.length) * 100;

  const frag = document.createDocumentFragment();

  const hdr = div("hdr");
  hdr.style.background = sec.color;
  const eyebrow = div("eyebrow"); eyebrow.textContent = `Frage ${S.step + 1} von ${Q.length}`;
  const badge = div("section-badge"); badge.textContent = sec.label;
  const h1 = el("h1", {}); h1.textContent = q.text;
  hdr.appendChild(eyebrow); hdr.appendChild(badge); hdr.appendChild(h1);

  const progWrap = div("prog-wrap");
  const progFill = div("prog-fill"); progFill.style.width = `${progress}%`;
  progWrap.appendChild(progFill);

  const body = div("body");

  if (q.hint) {
    const hint = div("hint"); hint.textContent = q.hint;
    body.appendChild(hint);
  }

  // Render question input
  if (q.type === "gefuehl") body.appendChild(renderGefuehl(q));
  else if (q.type === "scale") body.appendChild(renderScale(q));
  else if (q.type === "radio") body.appendChild(renderRadio(q));
  else if (q.type === "multi3") body.appendChild(renderMulti(q, 3));
  else if (q.type === "multi") body.appendChild(renderMulti(q, null));
  else if (q.type === "ta") body.appendChild(renderTextarea(q));
  else if (q.type === "deadline") body.appendChild(renderDeadline(q));

  // Error
  if (S.error) {
    const err = div("err"); err.textContent = S.error;
    body.appendChild(err);
  }

  // Nav
  const nav = div("nav");
  const backBtn = el("button", {
    className: "btn-ghost",
    onClick: () => { S.error = null; if (S.step > 0) S.step--; else S.phase = "welcome"; render(); }
  });
  backBtn.textContent = "← Zurück";

  const nextBtn = el("button", { className: "btn" });
  nextBtn.textContent = S.step < Q.length - 1 ? "Weiter →" : "Meine Analyse →";
  nextBtn.disabled = !canAdvance(q);
  nextBtn.addEventListener("click", () => {
    if (S.step < Q.length - 1) { S.step++; render(); }
    else { runAnalysis(); }
  });

  updateBtn = () => { nextBtn.disabled = !canAdvance(q); };

  nav.appendChild(backBtn);
  nav.appendChild(nextBtn);
  body.appendChild(nav);

  frag.appendChild(hdr);
  frag.appendChild(progWrap);
  frag.appendChild(body);
  return frag;
}

// ─── LOADING ────────────────────────────────────────────────────
function renderLoading() {
  const frag = document.createDocumentFragment();

  const hdr = div("hdr");
  const eyebrow = div("eyebrow"); eyebrow.textContent = "Alma Mater Schreibcoaching";
  const h1 = el("h1", {}); h1.textContent = "Deine Analyse entsteht …";
  hdr.appendChild(eyebrow); hdr.appendChild(h1);

  const body = div("loading-body");
  const spinner = div("spinner");
  const txt = el("p", {}); txt.textContent = "Ich lese deine Antworten sorgfältig durch. Das dauert einen Moment.";
  body.appendChild(spinner);
  body.appendChild(txt);

  frag.appendChild(hdr);
  frag.appendChild(body);
  return frag;
}

// ─── RESULTS ────────────────────────────────────────────────────
function renderResults() {
  const r = S.result;
  const product = PRODUCTS[r.kategorie] || PRODUCTS.collection;

  const frag = document.createDocumentFragment();

  // Header
  const hdr = div("hdr green");
  const eyebrow = div("eyebrow"); eyebrow.textContent = "Dein Textbeziehungs-Audit · Alma Mater";
  const h1 = el("h1", {}); h1.textContent = `Hallo ${S.name} — hier ist deine persönliche Analyse.`;
  hdr.appendChild(eyebrow); hdr.appendChild(h1);

  const body = div("res-body");

  // Mood row
  if (r.vorher && r.nachher) {
    const gVor = GEFUEHL.find(g => g.v === r.vorher);
    const gNach = GEFUEHL.find(g => g.v === r.nachher);
    if (gVor && gNach) {
      const moodRow = div("mood-row");
      const mV = div("mood-item");
      const mVE = div("mood-emoji"); mVE.textContent = gVor.e;
      const mVL = div("mood-lbl"); mVL.textContent = "Vorher";
      mV.appendChild(mVE); mV.appendChild(mVL);
      const arr = div("mood-arrow"); arr.textContent = "→";
      const mN = div("mood-item");
      const mNE = div("mood-emoji"); mNE.textContent = gNach.e;
      const mNL = div("mood-lbl"); mNL.textContent = "Nachher";
      mN.appendChild(mNE); mN.appendChild(mNL);
      moodRow.appendChild(mV); moodRow.appendChild(arr); moodRow.appendChild(mN);
      body.appendChild(moodRow);
    }
  }

  function section(labelText, content) {
    const sec = div("res-section");
    const lbl = div("res-label"); lbl.textContent = labelText;
    sec.appendChild(lbl);
    if (typeof content === "string") {
      const txt = el("p", {}); txt.textContent = content;
      sec.appendChild(txt);
    } else {
      sec.appendChild(content);
    }
    body.appendChild(sec);
    body.appendChild(div("divider"));
  }

  // Intro
  const introP = el("p", { style: { fontStyle: "italic", fontSize: "15px", lineHeight: "1.8" } });
  introP.textContent = r.einleitung;
  body.appendChild(div("res-section", introP));
  body.appendChild(div("divider"));

  section("Deine Textbeziehung", r.textbeziehung_analyse);
  section("Deine Care-Dynamik", r.care_dynamik);
  if (r.selbstwirksamkeit_einblick) section("Selbstwirksamkeit — zwei Seiten", r.selbstwirksamkeit_einblick);

  // Hauptmuster
  const musterSec = div("res-section");
  const musterLbl = div("res-label"); musterLbl.textContent = "Was ich in deiner Situation sehe";
  const tag = div("tag"); tag.textContent = r.hauptmuster?.name || "";
  const musterTxt = el("p", {}); musterTxt.textContent = r.hauptmuster?.erklaerung || "";
  musterSec.appendChild(musterLbl); musterSec.appendChild(tag); musterSec.appendChild(musterTxt);
  body.appendChild(musterSec);
  body.appendChild(div("divider"));

  // Deep Work
  const dw = r.deep_work || {};
  const bereit = dw.bereitschaft === "hoch" || dw.bereitschaft === "mittel";
  const dwSec = div("res-section");
  const dwLbl = div("res-label"); dwLbl.textContent = "Dein Deep Work";
  const dwBadge = div("badge " + (bereit ? "green" : "gold"));
  dwBadge.textContent = bereit ? "✓ Du bist bereit für Deep Work" : "→ Erst Fundament legen";
  const dwBox = div("dw-box");
  const dwTitle = div("dw-title"); dwTitle.textContent = `Modell: ${dw.modell || ""}`;
  const dwBeg = el("p", {}); dwBeg.textContent = dw.modell_begruendung || "";
  dwBox.appendChild(dwTitle); dwBox.appendChild(dwBeg);
  if (dw.erste_schritte) {
    const dwSteps = div("dw-steps");
    const dwStepsLbl = el("strong", { style: { fontSize: "12px" } }); dwStepsLbl.textContent = "Erste Schritte:";
    const dwStepsTxt = document.createTextNode(" " + dw.erste_schritte);
    dwSteps.appendChild(dwStepsLbl); dwSteps.appendChild(dwStepsTxt);
    dwBox.appendChild(dwSteps);
  }
  dwSec.appendChild(dwLbl); dwSec.appendChild(dwBadge); dwSec.appendChild(dwBox);
  body.appendChild(dwSec);
  body.appendChild(div("divider"));

  // Mikro-Tipp
  if (r.mikro_tipp) {
    const mikSec = div("res-section");
    const mikLbl = div("res-label"); mikLbl.textContent = "Dein Tipp für heute";
    const mikBox = div("mikro-box"); mikBox.textContent = r.mikro_tipp;
    mikSec.appendChild(mikLbl); mikSec.appendChild(mikBox);
    body.appendChild(mikSec);
    body.appendChild(div("divider"));
  }

  // Schreibfee
  if (r.schreibfee) {
    section("Deine Schreibfee", r.schreibfee);
  }

  // Nächster Schritt
  const nextSec = div("res-section");
  const nextLbl = div("res-label"); nextLbl.textContent = "Dein nächster Schritt";
  const nextTxt = el("p", { style: { marginBottom: "14px" } }); nextTxt.textContent = r.naechster_schritt;

  const prodBox = div("product-box");
  const pname = div("pname"); pname.textContent = product.name;
  const pdesc = el("p", {}); pdesc.textContent = product.beschreibung;
  const pbtn = el("a", { href: product.url, target: "_blank", className: "product-btn" });
  pbtn.textContent = product.cta;
  prodBox.appendChild(pname); prodBox.appendChild(pdesc); prodBox.appendChild(pbtn);

  nextSec.appendChild(nextLbl); nextSec.appendChild(nextTxt); nextSec.appendChild(prodBox);

  // Alma-HOOD secondary
  if (r.alma_hood_empfehlung && r.kategorie !== "alma_hood") {
    const hoodBox = div("hood-box", { style: { marginTop: "12px" } });
    const hoodTitle = div(""); hoodTitle.className = "hood-title"; hoodTitle.textContent = "Und wenn du bereit bist für mehr:";
    const hoodDesc = el("p", {}); hoodDesc.textContent = r.alma_hood_empfehlung;
    const hoodBtn = el("a", { href: PRODUCTS.alma_hood.url, target: "_blank", className: "product-btn", style: { background: "#254b34", fontSize: "12px" } });
    hoodBtn.textContent = PRODUCTS.alma_hood.cta;
    hoodBox.appendChild(hoodTitle); hoodBox.appendChild(hoodDesc); hoodBox.appendChild(hoodBtn);
    nextSec.appendChild(hoodBox);
  }

  body.appendChild(nextSec);

  // Footer
  const footer = div("footer-note");
  footer.innerHTML = `Alma Mater Schreibcoaching · Dr. Wiebke Vogelaar<br>
    <a href="https://www.schreibcoaching-fuer-mamas.de">schreibcoaching-fuer-mamas.de</a><br>
    <span style="font-size:10px;margin-top:4px;display:block;">Deine Antworten wurden zur Analyse an Anthropic übermittelt und danach nicht gespeichert.</span>`;
  body.appendChild(footer);

  frag.appendChild(hdr);
  frag.appendChild(body);
  return frag;
}

// ─── INIT ────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
